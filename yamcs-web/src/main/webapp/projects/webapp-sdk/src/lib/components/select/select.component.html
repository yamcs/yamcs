<ya-button [matMenuTriggerFor]="selMenu" [icon]="icon()" dropdown="true" [disabled]="isDisabled()">
  @if (label(); as label) {
    {{ label }}
  } @else {
    <span style="color: grey">{{ emptyOption() }}</span>
  }
</ya-button>
@if (showClear()) {
  <ya-icon-action
    icon="clear"
    [padding]="true"
    [disabled]="isDisabled() || !label()"
    (click)="clearValue()"
    matTooltip="Clear value" />
}

<mat-menu #selMenu="matMenu" yPosition="below" class="ya-menu" [overlapTrigger]="false">
  @for (option of options(); track option.id) {
    @if (option.group) {
      <mat-divider />
    }
    <button
      mat-menu-item
      (click)="writeValue(option.id)"
      [matTooltip]="option.description"
      matTooltipPosition="right">
      <mat-icon [style.visibility]="isSelected(option.id) ? 'visible' : 'hidden'">check</mat-icon>
      {{ option.label }}
    </button>
  }
  @for (option of optionChildren(); track option.id()) {
    @if (option.group()) {
      <mat-divider />
    }
    <button
      mat-menu-item
      (click)="writeValue(option.id())"
      [matTooltip]="option.description()"
      matTooltipPosition="right">
      <mat-icon [style.visibility]="isSelected(option.id()) ? 'visible' : 'hidden'">check</mat-icon>
      {{ option.label() }}
    </button>
  }
</mat-menu>
