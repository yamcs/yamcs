@if (mini()) {
  <a
    [routerLink]="routerLink()"
    [queryParams]="queryParams"
    [class.mini]="true"
    [class.link-active]="linkActive()"
    [style.backgroundColor]="backgroundColor ? backgroundColor + ' !important' : undefined"
    [style.color]="color ? color + ' !important' : undefined">
    @if (icon) {
      <mat-icon class="item-icon">
        {{ icon }}
      </mat-icon>
    }
  </a>
} @else {
  <a
    [routerLink]="routerLink()"
    [queryParams]="queryParams"
    [class.mini]="false"
    [class.subitem]="subitem"
    [class.link-active]="linkActive()"
    [style.color]="color ? color + ' !important' : undefined">
    @if (subitem) {
      <div style="display: inline-block; width: 44px"></div>
    }
    @if (icon) {
      <mat-icon class="item-icon">
        {{ icon }}
      </mat-icon>
    }

    <div class="item-content">
      {{ label }}
      <ng-content />
    </div>
  </a>
}
