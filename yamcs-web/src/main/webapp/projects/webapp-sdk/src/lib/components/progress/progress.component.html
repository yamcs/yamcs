@switch (mode()) {
  @case ("indeterminate") {
    <div class="fill indeterminate"></div>
  }
  @default {
    <div class="fill" [style.width.%]="clampedPercentage()">
      <div class="fill-label" [style.width.px]="width()">
        {{ displayLabel() }}
      </div>
    </div>
    <div class="progress-label">
      {{ displayLabel() }}
    </div>
  }
}
<span>&nbsp;</span>
