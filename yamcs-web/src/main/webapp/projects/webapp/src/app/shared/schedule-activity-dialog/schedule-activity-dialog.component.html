<h2 mat-dialog-title>Run later</h2>

<mat-dialog-content>
  <div class="hint">
    <p>
      This {{ data.type }} will be submitted to the Yamcs Timeline, for execution at a later time.
    </p>
  </div>
  <ya-form [formGroup]="form">
    <ya-field label="Activity label">
      <input type="text" formControlName="name" />
    </ya-field>

    <ya-field label="Execution time">
      <ya-date-time-input formControlName="start" [showMillis]="true" [showNow]="true" />
    </ya-field>

    <ya-field label="Start automatically">
      <ya-slide-toggle formControlName="autoStart" />
    </ya-field>

    <ya-field-divider />

    <ya-field label="Timeline tags" hint="(optional)">
      <ya-help dialogTitle="Timeline Tags">
        Tags allow to categorise items per band. Bands only show items for which one of the tags is
        matching.
      </ya-help>
      <ya-tag-select formControlName="tags" />
    </ya-field>
  </ya-form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <div style="flex: 1 1 auto"></div>

  <ya-button mat-dialog-close>Cancel</ya-button>
  <ya-button appearance="primary" (click)="schedule()" [disabled]="!form.valid">Schedule</ya-button>
</mat-dialog-actions>
