syntax="proto2";

package yamcs.protobuf.timeline;
option java_package = "org.yamcs.protobuf";
option java_outer_classname = "TimelineProto";
option java_multiple_files = true;

import "google/protobuf/duration.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";
import "yamcs/api/annotations.proto";
import "yamcs/protobuf/activities/activities.proto";

//Methods related to the Timeline Service.
service TimelineApi {
  option (yamcs.api.markdown) = true;

  // Create or update an item
  rpc SaveItem(SaveItemRequest) returns (TimelineItem) {
    option (yamcs.api.route) = {
      post: "/api/timeline/{instance}/items"
      body: "*"
      additional_bindings {
        put: "/api/timeline/{instance}/items/{id}"
        body: "*"
      }
    };
  }

  // Get an item
  rpc GetItem(GetItemRequest) returns (TimelineItem) {
    option (yamcs.api.route) = {
      get: "/api/timeline/{instance}/items/{id}"
    };
  }

  // List items
  //
  // Two alternative URI forms can be used. The `GET` method is convenient, while
  // the `POST` method allows passing long filter expressions.  
  rpc ListItems(ListItemsRequest) returns (ListItemsResponse) {
    option (yamcs.api.route) = {
      get: "/api/timeline/{instance}/items"
      additional_bindings {
        post: "/api/timeline/{instance}/items:list"
        body: "*"
      }
    };
  }

  // Delete an item
  rpc DeleteItem(DeleteItemRequest) returns (TimelineItem) {
    option (yamcs.api.route) = {
      delete: "/api/timeline/{instance}/items/{id}"
    };
  }

  rpc BatchDeleteItems(BatchDeleteItemsRequest) returns (google.protobuf.Empty) {
    option (yamcs.api.route) = {
      post: "/api/timeline/{instance}/items:batchDelete"
      body: "*"
    };
  }

  // Get an item log
  rpc GetItemLog(GetItemLogRequest) returns (TimelineItemLog) {
    option (yamcs.api.route) = {
      get: "/api/timeline/{instance}/items/{id}/log"
    };
  }

  //add an entry to the item log table
  // The timestamp from the messages is used if specified; if not specified, the current mission time will be used 
  rpc AddItemLog(AddItemLogRequest) returns (LogEntry) {
    option (yamcs.api.route) = {
      post: "/api/timeline/{instance}/items/{id}/log"
    };
  }

  // Delete a group
  rpc DeleteTimelineGroup(DeleteTimelineGroupRequest) returns (TimelineItem) {
    option (yamcs.api.route) = {
      delete: "/api/timeline/{instance}/groups/{id}"
    };
  }

  // List timeline sources
  //
  // Usually there is a source named 'rdb' which provides items from an internal RocksDB database.
  // Other external sources may be created by adding plugins (e.g. a shift planner)
  rpc ListSources(ListSourcesRequest) returns (ListSourcesResponse) {
    option (yamcs.api.route) = {
      get: "/api/timeline/{instance}/sources"
    };
  }

  // List all tags available for the 'rdb' source.
  //
  // Note that currently the 'rdb' source does not discard unused tags
  // (e.g. if all item using one tag have been deleted, the tag will still be returned by this call)
  rpc ListTags(ListTimelineTagsRequest) returns (ListTimelineTagsResponse) {
    option (yamcs.api.route) = {
      get: "/api/timeline/{instance}/tags"
    };
  }

  // Create or update a band
  rpc SaveBand(SaveBandRequest) returns (TimelineBand) {
    option (yamcs.api.route) = {
      post: "/api/timeline/{instance}/bands"
      body: "*"
      additional_bindings {
        put: "/api/timeline/{instance}/bands/{id}"
        body: "*"
      }
    };
  }

  // Get a band
  rpc GetBand(GetBandRequest) returns (TimelineBand) {
    option (yamcs.api.route) = {
      get: "/api/timeline/{instance}/bands/{id}"
    };
  }

  // List all bands
  rpc ListBands(ListBandsRequest) returns (ListBandsResponse) {
    option (yamcs.api.route) = {
      get: "/api/timeline/{instance}/bands"
    };
  }

  // Delete a band
  rpc DeleteBand(DeleteBandRequest) returns (TimelineBand) {
    option (yamcs.api.route) = {
      delete: "/api/timeline/{instance}/bands/{id}"
    };
  }

  // Create or update a view
  rpc SaveView(SaveViewRequest) returns (TimelineView) {
    option (yamcs.api.route) = {
      post: "/api/timeline/{instance}/views"
      body: "*"
      additional_bindings {
        put: "/api/timeline/{instance}/views/{id}"
        body: "*"
      }
    };
  }

  // Get a view
  rpc GetView(GetViewRequest) returns (TimelineView) {
    option (yamcs.api.route) = {
      get: "/api/timeline/{instance}/views/{id}"
    };
  }

  // List all views
  rpc ListViews(ListViewsRequest) returns (ListViewsResponse) {
    option (yamcs.api.route) = {
      get: "/api/timeline/{instance}/views"
    };
  }

  // Delete a view
  rpc DeleteView(DeleteViewRequest) returns (TimelineView) {
    option (yamcs.api.route) = {
      delete: "/api/timeline/{instance}/views/{id}"
    };
  }
  
  // Manually start an activity
  rpc StartActivity(StartActivityRequest) returns (yamcs.protobuf.activities.ActivityInfo) {
    option (yamcs.api.route) = {
      post: "/api/timeline/{instance}/items/{id}:startActivity"
    };
  }

  // Cancel a planned activity
  rpc CancelActivity(CancelActivityRequest) returns (google.protobuf.Empty) {
    option (yamcs.api.route) = {
      post: "/api/timeline/{instance}/items/{item}:cancelActivity"
    };
  }

  // Receive item change notifications
  //
  // When any item has changed (create-update-delete), an empty notification message
  // is sent. Messages are bundled over a 5 second interval. 
  rpc SubscribeItemChanges(SubscribeItemChangesRequest) returns (stream google.protobuf.Empty) {
    option (yamcs.api.websocket) = {
      topic: "timeline-item-changes"
    };
  }
}

message SubscribeItemChangesRequest {
  // Yamcs instance name
  optional string instance = 1;
}

message RelativeTime {
  // Identifier of the item that this time is relative to.
  optional string relto = 1;

  optional google.protobuf.Duration relativeStart = 2;
}

enum TimelineItemType {
  // Events are things that will happen at a specific time.
  EVENT = 1;

  // Unlike events, activities have an execution status
  ACTIVITY = 2;

  // A grouping of other items (events and/or activities)
  ITEM_GROUP = 4;

  // A grouping of activities. The group is itself an activity
  ACTIVITY_GROUP = 5;
}

// Execution status of an activity

enum ExecutionStatus {
  // The activity is planned for future execution. Not yet eligible to start.
  PLANNED = 1;
  
  // The activity is waiting to be started manually by an operator.
  // This is typically the case for activities with autoStart = false.
  READY = 7;
  
  // The activity will be able to start once its dependencies have completed.
  WAITING_ON_DEPENDENCY = 8;
  
  // The activity is currently running 
  IN_PROGRESS = 2;
  
  // The activity has completed successfully
  SUCCEEDED = 3;
  
  // The activity started but was manually aborted by the operator.
  ABORTED = 4;
  
  // The activity has completed with failure.
  FAILED = 5;
    
  // The activity was skipped because a dependency was not met.
  SKIPPED = 6;
  
  // The activity was canceled before starting, typically by operator action.
  CANCELED = 9;
  
  // The activity was paused explicitly by the operator.
  PAUSED = 10;
  
  // The activity is paused during execution, waiting for user input or intervention.
  // Once input is received, execution may continue automatically.
  WAITING_FOR_INPUT = 11;
}


message TimelineItem {
  // Item identifier.
  //
  // The identifier is assigned by the source that created the item.
  //
  // It is possible but unlikely for two items coming from two different
  // sources to have the same identifier.
  //
  // - The "rdb" source sets the id to a UUID. 
  // ` The "commands" source sets the id to the command id
  optional string id = 1;
  
  // Human-readable name of this item
  optional string name = 2;
  
  optional TimelineItemType type = 3;

  // Absolute start time of the item (computed by the server when
  // `relativeTime` is used).
  optional google.protobuf.Timestamp start = 4;
  optional google.protobuf.Duration duration = 5;
  repeated string tags = 6;

  // If this item belongs to a group, this is the group identifier
  optional string groupId = 7;
    
  // If this item time specification is relative to another item, `relativeTime`
  // contains a reference to that item as well as the relative start (the duration
  // is the same as the `duration` field).
  //
  // Note that start of the item is computed by the server based on the
  // `relativeTime` before sending the item to the client.
  optional RelativeTime relativeTime = 8;

  // Detailed description of the item
  optional string description = 9;

  // Additional properties used by the Yamcs Web UI for rendering purposes.
  map<string, string> properties = 14;

  // Mission-specific custom data. Unlike `properties`, this field is ignored
  // by the Yamcs Web UI.
  map<string, string> extra = 18;

  // For activities: execution status
  optional ExecutionStatus status = 10;

  // For activities: if the status is FAILED or ABORTED, this may indicate the reason
  // some information may also be available in the item log 
  optional string failureReason = 11;

  // Activity definition associated to this item.
  // Only set when `type` equals ACTIVITY.
  optional yamcs.protobuf.activities.ActivityDefinitionInfo activityDefinition = 13;

  // Identifiers of activity runs matching this item.
  // Only set when `type` equals ACTIVITY.
  repeated string runs = 15;

  // Activity runs for this item
  // Only set when `type` equals ACTIVITY.
  repeated yamcs.protobuf.activities.ActivityInfo activityRuns = 19;
  
  // Dependencies on other activities/events.
  //
  // Only applicable when `type` equals ACTIVITY.
  //
  // Start time of this activity is derived by looking at each predecessor's
  // start condition and among them establishing the latest start time.
  repeated PredecessorInfo predecessors = 16;

  // Indicates if the activity should start automatically. If false,
  // the activity goes into READY state and must be started manually.
  //
  // Only applicable when `type` equals ACTIVITY.  
  optional bool autoStart = 17;  
}

message LogEntry {
  optional google.protobuf.Timestamp time = 1;
  optional string user = 2;
  optional string type = 3;
  optional string msg = 4;
}

message TimelineItemLog {
  optional string id = 1;
  //item (change) log
  repeated LogEntry entries = 2;
}

enum TimelineBandType {
  TIME_RULER = 1;
  ITEM_BAND = 2;
  SPACER = 3;
  COMMAND_BAND = 4;
  PARAMETER_PLOT = 5;
  PARAMETER_STATES = 6;
}

message BatchDeleteItemsRequest {
  // Yamcs instance name
  optional string instance = 1;

  // Item source
  optional string source = 2;

  // Item identifiers
  repeated string id = 3;

  // Filter on item start
  optional google.protobuf.Timestamp start = 4;

  // Filter on item stop
  optional google.protobuf.Timestamp stop = 5;

  // Filter query. See {doc}`../filtering` for how to write a filter query.
  //
  // Literal text search matches against the `label` field. Field comparisons
  // can use any of the following fields:
  //
  // | Field    | Type   | Description      |
  // | -------- | ------ | ---------------- |
  // | `label`  | string | Filter by label  |
  // | `tag`    | string | Filter by tag    |
  // | `type`   | enum   | Filter by type   |
  // | `status` | enum   | Filter by status |
  //
  // `type` is one of `activity` or `event`.
  //
  // `status` is one of `planned`, `ready`, `waiting_on_dependency`,
  // `in_progress`, `succeeded`, `aborted`, `failed`, `skipped`, `canceled`,
  // `paused` or `waiting_for_input`.
  optional string filter = 6;
}

message TimelineBand {
  // Yamcs instance name
  optional string instance = 1;

  // Band identifier (UUID)
  optional string id = 2;

  // Band name
  optional string name = 3;

  // User who has created the band
  optional string username = 4;

  // If true, all users have access to this band, otherwise only the user who has created it
  optional bool shared = 5;

  // The band contains only items from this source
  optional string source = 6;

  // The band contains only items with these tags. If the list is empty,
  // all items from the given source are part of the band.
  repeated string tags = 7;

  // If specified, the band shows only items matching this filter
  optional string filter = 13;

  // Type of band
  optional TimelineBandType type = 9;

  // Detailed description of this band
  optional string description = 10;

  // Additional properties used by the Yamcs Web UI for rendering purposes.
  map<string, string> properties = 11;

  // Mission-specific custom data. Unlike `properties`, this field is ignored
  // by the Yamcs Web UI.
  map<string, string> extra = 12;
}

message TimelineView {
  // Yamcs instance name
  optional string instance = 1;

  // View identifier. This is a UUID
  optional string id = 2;

  // View name
  optional string name = 3;

  // View description
  optional string description = 4;

  // array of bands
  repeated TimelineBand bands = 5;
}

message SaveItemRequest {
  // Yamcs instance name
  optional string instance = 1;
  
  // Item source
  optional string source = 2;

  // Optional item identifier.
  //
  // If not set, an ID will be assigned by the server.
  //
  // If set, it should be a valid UUID.
  optional string id = 13;

  // Item name
  optional string name = 3;
  
  // Item type
  optional TimelineItemType type = 4;

  // Item start. The fields `start`, `relativeTime` and `dependsOn`
  // are mutually exclusive
  optional google.protobuf.Timestamp start = 5;
  
  // Item duration. Applies also if `relativeTime` is specified
  optional google.protobuf.Duration duration = 6;
  
  // Tags
  repeated string tags = 7;

  // If this item is part of a group, this is the group identifier
  optional string groupId = 8;

  // If the item time specification is relative to another item,
  // `relativeTime` contains a reference to that item, as well
  // as the relative start (the duration is the same as given by the
  // `duration` field).
  optional RelativeTime relativeTime = 9;

  // Item description
  optional string description = 10;

  // Additional properties used by the Yamcs Web UI for rendering purposes.
  map<string, string> properties = 11;

  // Mission-specific custom data. Unlike `properties`, this field is ignored
  // by the Yamcs Web UI.
  map<string, string> extra = 18;

  // Activity definition associated to this item.
  //
  // Required if `type` is ACTIVITY.
  optional yamcs.protobuf.activities.ActivityDefinitionInfo activityDefinition = 12;

  // Can be used only if `type` is ACTIVITY.
  //
  // Specifies which other activities/items this activity depends on.
  //
  // Start time of this activity is derived by looking at each predecessor's
  // start condition and among them establishing the latest start time.
  repeated PredecessorInfo predecessors = 14;

  // Can be used only if `type` is ACTIVITY
  //
  // Indicates if the activity should start automatically.
  //
  // When `false`, the activity will be moved to `READY` state waiting to be
  // started manually.
  //
  // Defaults to `false` for manual activities, and `true` otherwise.   
  optional bool autoStart = 17;

  // TODO possible future additions to activities:
  // startNotEarlierThan
  // startNotLaterThan
}

// Defines the conditions under which an activity that depends on another
// activity should be started.
enum StartCondition {
  // Start this activity regardless of the outcome of the predecessor.
  // This can be used to make activities depend on other non-activity items
  ON_COMPLETION = 1;

  // Start this activity only if the predecessor completes successfully.
  ON_SUCCESS = 2;

  // Start this activity only if the predecessor fails.
  ON_FAILURE = 3;

  // Start this activity as soon as its predecessor has started
  ON_START = 4;
}

message PredecessorInfo {
  // Item identifier of the predecessor
  optional string itemId = 1;

  // What is the predecessor's state before the successor
  // can be started. 
  //
  // If not specified, ON_COMPLETION will be used
  optional StartCondition startCondition = 2;

  // Name of the predecessor item
  //
  // This is an output field only
  optional string name = 3;
}

message GetItemRequest {
  // Yamcs instance name
  optional string instance = 1;

  // Item source
  optional string source = 2;

  // Item identifier
  optional string id = 3;
}

message ListItemsRequest {
  // Yamcs instance name
  optional string instance = 1;

  // Item source
  optional string source = 2;
      
  optional int32 limit = 3;

  // Continuation token returned by a previous page response.
  optional string next = 4;

  // Filter on item start
  optional google.protobuf.Timestamp start = 5;

  // Filter on item stop
  optional google.protobuf.Timestamp stop = 6;

  // Use the band defined source and filter
  optional string band = 7;

  // If true, send the items with full details
  // If false, some details like the description will be omited from the listed items
  optional bool details = 9;

  // Filter query. See {doc}`../filtering` for how to write a filter query.
  //
  // Literal text search matches against the `label` field. Field comparisons
  // can use any of the following fields:
  //
  // | Field    | Type   | Description      |
  // | -------- | ------ | ---------------- |
  // | `label`  | string | Filter by label  |
  // | `tag`    | string | Filter by tag    |
  // | `type`   | enum   | Filter by type   |
  // | `status` | enum   | Filter by status |
  //
  // `type` is one of `activity` or `event`.
  //
  // `status` is one of `planned`, `ready`, `waiting_on_dependency`,
  // `in_progress`, `succeeded`, `aborted`, `failed`, `skipped`, `canceled`,
  // `paused` or `waiting_for_input`.
  optional string filter = 10;
}

message DeleteItemRequest {
  // Yamcs instance name
  optional string instance = 1;

  // Item source
  optional string source = 2;

  // Item identifier
  optional string id = 3;
}

message GetItemLogRequest {
  // Yamcs instance name
  optional string instance = 1;

  // Item source
  optional string source = 2;

  // Item identifier
  optional string id = 3;
}

message AddItemLogRequest {
  // Yamcs instance name
  optional string instance = 1;

  // Item source
  optional string source = 2;

  // Item identifier
  optional string id = 3;

  optional LogEntry entry = 4;
}

message DeleteTimelineGroupRequest {
  // Yamcs instance name
  optional string instance = 1;

  // Item source
  optional string source = 2;

  // Group identifier
  optional string id = 3;
}

message ListItemsResponse {
  // Item source
  optional string source = 1;

  // Items
  repeated TimelineItem items = 2;

  // Token indicating the response is only partial. More results can then
  // be obtained by performing the same request (including all original
  // query parameters) and setting the `next` parameter to this token.
  optional string continuationToken = 3;
}

message TimelineSourceCapabilities {
	optional bool readOnly = 1;
	optional bool hasManualActivities = 2;
	optional bool hasAutomatedActivities = 3;
	optional bool hasEventGroups = 4;
	optional bool hasActivityGroups = 5;
}

message ListSourcesRequest {
  // Yamcs instance name
  optional string instance = 1;
}

message ListSourcesResponse {
  map<string, TimelineSourceCapabilities> sources = 1;
}

message ListTimelineTagsRequest {
  // Yamcs instance name
  optional string instance = 1;

  optional string source = 2;
}

message ListTimelineTagsResponse {
  repeated string tags = 1;
}

message SaveBandRequest {
  // Yamcs instance name
  optional string instance = 1;

  // Optional band identifier.
  //
  // If not set, an ID will be assigned by the server.
  //
  // If set, it should be a valid UUID.
  optional string id = 10;

  // Band name
  optional string name = 2;

  // If true, all users have access to this band, otherwise only the user who has created it 
  optional bool shared = 3;
  
  // Where the items shown on this band come from
  optional string source = 4;

  // Items containing these tags will be part of the timeline
  repeated string tags = 5;

  // If specified, the band shows only items matching this filter
  optional string filter = 12;

  // Type of band
  optional TimelineBandType type = 7;

  // Band description
  optional string description = 8;

  // Additional properties used by the Yamcs Web UI for rendering purposes.
  map<string, string> properties = 9;

  // Mission-specific custom data. Unlike `properties`, this field is ignored
  // by the Yamcs Web UI.
  map<string, string> extra = 11;
}

message GetBandRequest {
  // Yamcs instance name
  optional string instance = 1;

  // Item identifier
  optional string id = 3;
}

message ListBandsRequest {
  //Yamcs instance name
  optional string instance = 1;
}

message DeleteBandRequest {
  // Yamcs instance name
  optional string instance = 1;

  // Item identifier
  optional string id = 3;
}

message ListBandsResponse {
  repeated TimelineBand bands = 1;
}

message SaveViewRequest {
  // Yamcs instance name
  optional string instance = 1;

  // Optional view identifier.
  //
  // If not set, an ID will be assigned by the server.
  //
  // If set, it should be a valid UUID. If a view with
  // this identifier already exists, it is replaced. 
  optional string id = 5;

  // View name
  optional string name = 2;

  // View description
  optional string description = 3;

  // The bands belonging to this view
  repeated string bands = 4;
}

message GetViewRequest {
  // Yamcs instance name
  optional string instance = 1;

  // Item identifier
  optional string id = 3;
}

message ListViewsRequest {
  // Yamcs instance name
  optional string instance = 1;
}

message DeleteViewRequest {
  // Yamcs instance name
  optional string instance = 1;

  // Item identifier
  optional string id = 3;
}

message ListViewsResponse {
  repeated TimelineView views = 1;
}

message StartActivityRequest {
  // Yamcs instance name
  optional string instance = 1;

  /* Item source
  	 For the moment only activities stored in the internal db are possible 
   	optional string source = 2;
   */

  // Identifier of an activity item
  optional string id = 3;
}

message CompleteActivityRequest {
  // Yamcs instance name
  optional string instance = 1;

  // Identifier of an activity item
  optional string item = 3;

  // If set, the activity shall be marked as failed
  // instead of succeeded.
  optional string failureReason = 4;
}

message CancelActivityRequest {
  // Yamcs instance name
  optional string instance = 1;

  // Identifier of an activity item
  optional string item = 3;
}

message AbortActivityRequest {
  // Yamcs instance name
  optional string instance = 1;

  // Identifier of an activity item
  optional string item = 2;
}
